name: VC Intel Agent

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 UTC 00:00 = 한국 오전 9시
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 셋업
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: seen_entries 캐시 복원
        uses: actions/cache@v4
        with:
          path: seen_entries.json
          key: seen-entries-${{ github.run_id }}
          restore-keys: seen-entries-

      - name: 에이전트 실행
        env:
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python src/agent.py

      - name: seen_entries 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_entries.json
          key: seen-entries-${{ github.run_id }}
