name: VC Intel Agent

on:
  schedule:
    - cron: "0 0 * * *"    # 매일 09:00 KST (daily)
    - cron: "30 0 * * 1"   # 매주 월요일 09:30 KST (weekly)
    - cron: "0 1 1 * *"    # 매월 1일 10:00 KST (monthly)
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (daily/weekly/monthly/all)'
        required: false
        default: 'all'

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 셋업
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: python -m playwright install chromium --with-deps

      - name: seen_entries 캐시 복원
        uses: actions/cache@v4
        with:
          path: seen_entries.json
          key: seen-entries-${{ github.run_id }}
          restore-keys: seen-entries-

      - name: 실행 모드 결정
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "AGENT_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 0 * * 1" ]; then
            echo "AGENT_MODE=weekly" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 1 1 * *" ]; then
            echo "AGENT_MODE=monthly" >> $GITHUB_ENV
          else
            echo "AGENT_MODE=daily" >> $GITHUB_ENV
          fi

      - name: 에이전트 실행
        env:
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_KEY:        ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:    ${{ secrets.NOTION_DATABASE_ID }}
          NARRATIVE_DATABASE_ID: ${{ secrets.NARRATIVE_DATABASE_ID }}
        run: |
          if [ "$AGENT_MODE" = "weekly" ]; then
            python -c "import sys; sys.path.insert(0,'src'); from agent import run_weekly; run_weekly()"
          elif [ "$AGENT_MODE" = "monthly" ]; then
            python -c "import sys; sys.path.insert(0,'src'); from agent import run_monthly; run_monthly()"
          else
            python src/agent.py
          fi

      - name: seen_entries 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_entries.json
          key: seen-entries-${{ github.run_id }}
